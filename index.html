<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Play11 — Premium authentic football jerseys. Wear the legend." />
    <title>Play11 — Wear The Legend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== Play11 splash / loading screen (shows before React boots) ===== */
      #p11-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background:
          radial-gradient(circle at 50% 38%, rgba(200,162,74,0.16), transparent 55%),
          #0a0a0b;
        font-family: 'Anton', Impact, 'Arial Black', sans-serif;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #p11-splash.hide { opacity: 0; visibility: hidden; }
      .p11-emblem { position: relative; width: 132px; height: 132px; display: grid; place-items: center; }
      .p11-ring {
        position: absolute; inset: 0; border-radius: 50%;
        border: 2px solid rgba(200,162,74,0.18);
        border-top-color: #c8a24a; border-right-color: #e0c486;
        animation: p11spin 1s linear infinite;
      }
      .p11-ring.two {
        inset: 14px; border-width: 1px; border-top-color: transparent;
        border-left-color: rgba(200,162,74,0.5); animation-duration: 1.6s; animation-direction: reverse;
      }
      @keyframes p11spin { to { transform: rotate(360deg); } }
      .p11-num {
        font-size: 54px; line-height: 1; letter-spacing: 2px;
        background: linear-gradient(135deg, #e0c486, #c8a24a 60%, #fff 130%);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        animation: p11pulse 1.6s ease-in-out infinite;
      }
      @keyframes p11pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
      .p11-word {
        margin-top: 1.6rem; font-size: 2.4rem; letter-spacing: 0.14em; color: #f4f4f6;
      }
      .p11-word b { color: #c8a24a; font-weight: inherit; }
      .p11-tag {
        margin-top: 0.5rem; font-family: 'Inter', Arial, sans-serif; font-weight: 500;
        font-size: 0.72rem; letter-spacing: 0.42em; color: #9a9da8; text-transform: uppercase;
        animation: p11fade 2s ease-in-out infinite;
      }
      @keyframes p11fade { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
      .p11-bar { margin-top: 2.2rem; width: 200px; height: 3px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
      .p11-bar span {
        display: block; height: 100%; width: 40%; border-radius: 3px;
        background: linear-gradient(90deg, #c8a24a, #e0c486);
        animation: p11load 1.2s ease-in-out infinite;
      }
      @keyframes p11load {
        0% { transform: translateX(-120%); width: 40%; }
        50% { width: 70%; }
        100% { transform: translateX(360%); width: 40%; }
      }
    </style>
  </head>
  <body>
    <!-- Branded loading screen, removed once the app mounts -->
    <div id="p11-splash">
      <div class="p11-emblem">
        <div class="p11-ring"></div>
        <div class="p11-ring two"></div>
        <div class="p11-num">11</div>
      </div>
      <div class="p11-word">PLAY<b>11</b></div>
      <div class="p11-tag">Wear The Legend</div>
      <div class="p11-bar"><span></span></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

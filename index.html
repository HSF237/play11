<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Play11 — Premium authentic football jerseys. Wear the legend." />
    <title>Play11 — Wear The Legend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== Play11 splash / loading screen (shows before React boots) ===== */
      #p11-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(200,162,74,0.18), transparent 60%),
          #0a0a0b;
        font-family: 'Anton', Impact, 'Arial Black', sans-serif;
        transition: opacity 0.6s ease, visibility 0.6s ease;
        overflow: hidden;
      }
      #p11-splash.hide { opacity: 0; visibility: hidden; }
      .p11-word {
        font-family: 'Archivo Black', Impact, sans-serif;
        font-size: clamp(2.6rem, 12vw, 4.6rem); line-height: 1; letter-spacing: -0.02em;
        color: #f4f4f6; position: relative;
        opacity: 0; transform: translateY(18px);
        animation: p11WordIn 0.9s cubic-bezier(0.22,0.61,0.36,1) 0.1s forwards;
      }
      .p11-word b {
        font-weight: inherit;
        background: linear-gradient(135deg, #e0c486, #c8a24a 55%, #fff 130%);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      /* sheen sweep across the wordmark */
      .p11-word::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        transform: translateX(-120%); animation: p11Sheen 1.6s ease-in-out 0.9s infinite;
      }
      @keyframes p11WordIn { to { opacity: 1; transform: none; } }
      @keyframes p11Sheen { to { transform: translateX(120%); } }
      .p11-line {
        width: 0; height: 2px; margin-top: 1.1rem;
        background: linear-gradient(90deg, transparent, #c8a24a, transparent);
        animation: p11Line 0.8s ease 0.5s forwards;
      }
      @keyframes p11Line { to { width: 200px; } }
      .p11-tag {
        margin-top: 1rem; font-family: 'Inter', Arial, sans-serif; font-weight: 500;
        font-size: 0.72rem; letter-spacing: 0.42em; color: #9a9da8; text-transform: uppercase;
        opacity: 0; animation: p11TagIn 0.8s ease 0.7s forwards;
      }
      @keyframes p11TagIn { to { opacity: 1; } }
      .p11-bar { position: absolute; bottom: 12%; width: 180px; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
      .p11-bar span {
        display: block; height: 100%; width: 40%; border-radius: 2px;
        background: linear-gradient(90deg, #c8a24a, #e0c486);
        animation: p11Load 1.1s ease-in-out infinite;
      }
      @keyframes p11Load {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(360%); }
      }
    </style>
  </head>
  <body>
    <!-- Branded loading screen, removed once the app mounts -->
    <div id="p11-splash">
      <div class="p11-word">PLAY<b>11</b></div>
      <div class="p11-line"></div>
      <div class="p11-tag">Wear The Legend</div>
      <div class="p11-bar"><span></span></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
